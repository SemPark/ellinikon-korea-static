<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#063e62" />
    <title>THE IN PARTNERS - News Admin</title>
    <style>
      :root {
        --blue: #08658d;
        --deep: #004d72;
        --line: rgba(8, 101, 141, 0.16);
        --bg: #f6f7f4;
        --text: #171a18;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #fff;
        color: var(--text);
        font-family: Manrope, Arial, sans-serif;
      }

      .admin-header {
        min-height: 96px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 0 28px;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .brand-mark {
        width: 54px;
        height: 54px;
        display: grid;
        place-items: center;
        background: var(--deep);
        color: #fff;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        color: var(--deep);
        font-size: clamp(22px, 3vw, 34px);
        line-height: 1.05;
        font-weight: 500;
        letter-spacing: 0;
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .admin-frame-wrap {
        height: calc(100vh - 96px);
        min-height: 720px;
        background: var(--bg);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }

      @media (max-width: 720px) {
        .admin-header {
          min-height: 118px;
          align-items: flex-start;
          flex-direction: column;
          padding: 20px;
        }

        .brand-mark {
          width: 46px;
          height: 46px;
        }

        .admin-frame-wrap {
          height: calc(100vh - 118px);
          min-height: 680px;
        }
      }
    </style>
  </head>
  <body>
    <header class="admin-header">
      <div class="brand">
        <div class="brand-mark">THE IN</div>
        <h1>뉴스 관리자</h1>
      </div>
      <a class="home-link" href="./index.html#news">사이트 뉴스 보기</a>
    </header>
    <main class="admin-frame-wrap">
      <iframe
        src="https://customer-news-board.cleansam7.workers.dev/admin"
        title="더인파트너스 뉴스 관리자"
        referrerpolicy="no-referrer"
      ></iframe>
    </main>
  </body>
</html>
