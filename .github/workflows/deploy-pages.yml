name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - "news-worker/**"
      - ".github/workflows/deploy-news-worker.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        run: |
          mkdir _site
          cp -R .nojekyll index.html admin.html assets css js _site/

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
